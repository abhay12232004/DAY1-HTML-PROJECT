<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-purple-50 to-indigo-100 min-h-screen">
    <!-- Consistent Nav -->
    <nav class="bg-red-300 text-white px-10 py-8 flex justify-between items-center shadow-lg">
      <div class="flex space-x-6">
        <a href="/" class="hover:underline font-semibold">Home</a>
        <a href="/about" class="hover:underline font-semibold">About</a>
        <a href="/contact" class="hover:underline font-semibold">Contact</a>
      </div>
    </nav>

    <!-- Form Hero -->
    <main class="pt-32 pb-16 max-w-2xl mx-auto px-6">
      <div class="bg-white rounded-3xl shadow-2xl p-10 md:p-12 transform hover:scale-[1.02] transition-all duration-300">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2 text-center">Get In Touch</h1>
        <p class="text-xl text-gray-500 mb-12 text-center">We'd love to hear from you!</p>
        
        <!-- Contact Form -->
        <form id="contactForm" class="space-y-6">
          <!-- Name Field -->
          <div>
            <label class="block text-gray-700 font-semibold mb-3 text-lg">Full Name</label>
            <input 
              type="text" 
              id="name" 
              required 
              placeholder="Enter your name"
              class="w-full p-5 border-2 border-gray-200 rounded-2xl focus:ring-4 focus:ring-red-300 focus:border-transparent transition-all duration-300 text-lg"
            >
          </div>

          <!-- Email Field -->
          <div>
            <label class="block text-gray-700 font-semibold mb-3 text-lg">Email Address</label>
            <input 
              type="email" 
              id="email" 
              required 
              placeholder="your@email.com"
              class="w-full p-5 border-2 border-gray-200 rounded-2xl focus:ring-4 focus:ring-red-300 focus:border-transparent transition-all duration-300 text-lg"
            >
          </div>

          <!-- Message Field -->
          <div>
            <label class="block text-gray-700 font-semibold mb-3 text-lg">Message</label>
            <textarea 
              id="message" 
              required 
              rows="6"
              placeholder="Tell us about your project or question..."
              class="w-full p-5 border-2 border-gray-200 rounded-2xl focus:ring-4 focus:ring-red-300 focus:border-transparent transition-all duration-300 text-lg resize-vertical"
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit"
            class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-6 px-8 rounded-2xl font-bold text-xl shadow-xl hover:from-red-600 hover:to-red-700 transform hover:scale-105 hover:shadow-2xl transition-all duration-300"
          >
            Send Message →
          </button>
        </form>

        <!-- Success Message (Hidden Initially) -->
        <div id="successMsg" class="mt-8 p-8 bg-green-100 border-2 border-green-400 rounded-2xl hidden">
          <div class="text-center">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">✓</div>
            <h2 class="text-2xl font-bold text-green-800 mb-2">Message Sent!</h2>
            <p class="text-lg text-green-700">We'll get back to you within 24 hours. Thank you!</p>
          </div>
        </div>
      </div>

      <!-- Alternative Contact Info -->
      <div class="mt-16 text-center text-gray-600">
        <p class="text-lg">Or reach us directly:</p>
        <p class="text-2xl font-semibold text-gray-800 mt-2">hello@yoursite.com</p>
      </div>
    </main>

    <!-- Simple Form Handler (Client-Side Demo) -->
    <script>
      document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Hide form, show success
        this.style.display = 'none';
        document.getElementById('successMsg').classList.remove('hidden');
        
        // Reset after 5s (demo only)
        setTimeout(() => {
          this.style.display = 'block';
          document.getElementById('successMsg').classList.add('hidden');
        }, 5000);
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Single value Messaging</h2>
    <div class="display">Waiting for messages</div>
    <input type="text" class="inp" placeholder="Tyoe value ...">
    <button onclick="send()">Send</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function send(){
            const value = document.querySelector('inp').value;
            socket.emit('client-msg',value);
            document.querySelector('inp').value='';

        }

        socket.on('server-msg',(data)=>{
            document.querySelector('display').innerText = data;
        })
    </script>
</body>
</html>
